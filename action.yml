name: 'NAIS SLSA Provenance Action'
description: 'A POC Action to generate signed SLSA provenance'
branding:
  icon: lock
  color: red
inputs:
  repo_dir:
    description: 'path to directory of artifacts'
    required: false
  repo_name:
    description: 'path to write build provenance file'
    required: true
  image:
    description: 'docker image to pull and sign'
    required: true
  github_context:
    description: 'internal (do not set): the "github" context object in json'
    required: true
    default: ${{ toJSON(github) }}
  runner_context:
    description: 'internal (do not set): the "runner" context object in json'
    required: true
    default: ${{ toJSON(runner) }}
  # env_context:
  #   description: 'internal (do not set): the "env" context object in json'
  #   required: false
  #   default: ${{ toJSON(env) }}
runs:
  using: 'composite'
  steps:
    # 1. Needed for attest command, prepare here
    - name: Build and push
      uses: docker/build-push-action@v2
      with:
        push: true
        tags: ttl.sh/${{ inputs.repo_name }}:1h
    # 2. checkout salsa
    - uses: actions/checkout@v2
      with:
        repository: nais/salsa
        path: salsa
    # Prepare args for docker run
    - name: docker arguments
      id: docker-args
      shell: bash
      run: |
        encoded_github="$(echo ${GITHUB_CONTEXT} | base64 -w 0)"
        encoded_runner="$(echo ${RUNNER_CONTEXT} | base64 -w 0)"
        echo "::set-output name=github::${encoded_github}"
        echo "::set-output name=runner::${encoded_runner}"
      env:
        GITHUB_CONTEXT: ${{ inputs.github_context }}
        RUNNER_CONTEXT: ${{ inputs.runner_context }}
    # 3. Build container we need to perform commands
    # Can be done more smooth with download of binary from repo
    # and installation files
    - name: Build Salsa
      uses: docker/build-push-action@v2
      with:
        push: false
        tags: nais/salsa:latest
        context: .
        build-args: |
          repo="${{ inputs.repo_name }}"
          image="${{ inputs.image }}"
          github=${{ steps.docker-args.outputs.github }}
          github=${{ steps.docker-args.outputs.runner }}

    - name: Make Salsa
      run: |
        docker run nais/salsa:latest
      shell: bash


