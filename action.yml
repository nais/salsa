name: 'NAIS SLSA Provenance Action'
description: 'A POC Action to generate signed SLSA provenance'
branding:
  icon: lock
  color: red
inputs:
  repo_dir:
    description: |-
      path to directory of artifacts
    required: false
  repo_name:
    description: |-
      path to write build provenance file
    required: true
    default: ${{ github.repository }}
  image:
    description: |-
      docker image to pull and sign
    required: true
  gcp_credentials:
    description: |-
      gcp serviceuser credentials to sign and upload the slsa provenance
    required: true
  github_context:
    description: |-
      internal (do not set): the "github" context object in json
    required: true
    default: ${{ toJSON(github) }}
  runner_context:
    description: |-
      internal (do not set): the "runner" context object in json
    required: true
    default: ${{ toJSON(runner) }}
  # env_context:
  #   description: 'internal (do not set): the "env" context object in json'
  #   required: false
  #   default: ${{ toJSON(env) }}
runs:
  using: 'composite'
  steps:

    # Prepare image
    - name: Prepare current repository image and repo name
      id: cosign-ttl
      shell: bash
      run: |
        repo="${REPO_NAME##*/}"
        image=ttl.sh/"${repo}":1h
        echo "::set-output name=image::${image}"
        echo "::set-output name=repo_name::${repo}"
      env:
        REPO_NAME: ${{ inputs.repo_name }}

    # Needed for attest to sign and verify command
    - name: Build and push current provenance container to sign
      id: ttl
      uses: docker/build-push-action@v2
      with:
        push: true
        tags: ${{ steps.cosign-ttl.outputs.image }}

    # checkout salsa / could be done with binary
    - uses: actions/checkout@v2
      with:
        repository: nais/salsa
        path: salsa

    # env to file google credentials
    - name: Google auth and credentials
      id: google
      uses: 'google-github-actions/auth@v0'
      with:
        credentials_json: ${{ inputs.gcp_credentials }}
        create_credentials_file: true

    # Prepare environment variables for docker run
    - name: docker container environment
      id: docker-envs
      shell: bash
      run: |
        salsa_docker_image=nais/salsa:latest
        encoded_github="$(echo ${GITHUB_CONTEXT} | base64 -w 0)"
        encoded_runner="$(echo ${RUNNER_CONTEXT} | base64 -w 0)"
        gcp_path="${GCP_CREDENTIAL_PATH##*/}"
        echo "::set-output name=github::${encoded_github}"
        echo "::set-output name=runner::${encoded_runner}"
        echo "::set-output name=gcp_creds::${gcp_path}"
        echo "::set-output name=salsa_image_with_tag::${salsa_docker_image}"
      env:
        GITHUB_CONTEXT: ${{ inputs.github_context }}
        RUNNER_CONTEXT: ${{ inputs.runner_context }}
        GCP_CREDENTIAL_PATH: ${{ steps.google.outputs.credentials_file_path }}

    # Build container we need to perform commands
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1

    - name: Build Salsa
      uses: docker/build-push-action@v2
      with:
        push: false
        tags: ${{ steps.docker-envs.outputs.salsa_image_with_tag }}
        context: .
        build-args: |
          dir=${{ github.workspace }}
          repo=${{ steps.cosign-ttl.outputs.repo_name }}
          image=${{ steps.cosign-ttl.outputs.image }}
          github=${{ steps.docker-envs.outputs.github  }}
          runner=${{ steps.docker-envs.outputs.runner }}
          gcp_cred_path=${{ steps.docker-envs.outputs.gcp_creds }}

    # Pico-de-gallo
    - name: Make Salsa - Pico-de-Gallo
      run: |
        docker run ${{ steps.docker-envs.outputs.salsa_image_with_tag }}
      shell: bash
      #env:
        # SALSA_SCAN_REPO_DIR: ${{ github.workspace }}
        #SALSA_SCAN_REPO: ${{ steps.cosign-ttl.outputs.repo_name }}
        #SALSA_SCAN_GITHUB_CONTEXT: ${{ steps.docker-envs.outputs.github }}
        #SALSA_SCAN_RUNNER_CONTEXT: ${{ steps.docker-envs.outputs.runner }}
        #SALSA_REPO_IMAGE: ${{ steps.cosign-ttl.outputs.image }}
        #GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.docker-envs.outputs.gcp_creds }}